---
# This file holds values that SHOULD be encrypted with ansible-vault in real use:
#   ansible-vault encrypt group_vars/all/secrets.yml
#
# `querybook_user_password_secrets` is referenced from resources.yml via the
# *_secret fields on user entries.
#
# `querybook_env_extra_secrets` is materialized as plain `KEY=value` lines
# in the rendered env-config file. Use these values via ${KEY} substitution
# inside JSON connection strings of querybook_env_query_engines /
# querybook_env_metastores. Querybook's loader interpolates ${KEY} at
# startup, so secrets never end up in the application DB.

querybook_env_extra_secrets: {}
  # QUERYBOOK_PROD_PG_PASSWORD: "the-real-prod-password"

querybook_user_password_secrets:
  analyst: "analyst-change-me"
